<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Eventos</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
</head>

<body>

<main class="page">
  <div class="card">
    <h2 class="page-title">Novo Evento</h2>

    <form id="form" class="form">
      <label class="field">
        <span class="label">Data</span>
        <input type="date" id="data" required>
      </label>

      <label class="field">
        <span class="label">Hora</span>
        <input type="time" id="hora" required>
      </label>

      <label class="field">
        <span class="label">Sala</span>
        <input type="text" id="sala" placeholder="Ex.: Sala 01" required>
      </label>

      <label class="field">
        <span class="label">Evento</span>
        <input type="text" id="evento" placeholder="Ex.: Reunião" required>
      </label>

      <label class="field">
        <span class="label">Solicitante</span>
        <input type="text" id="solicitante" placeholder="Nome / setor" required>
      </label>

      <label class="field">
        <span class="label">Repetir</span>
        <select id="repetir">
          <option value="nao">Não</option>
          <option value="sim">Sim</option>
        </select>
      </label>

      <div class="actions">
        <button class="btn btn-primary" type="submit">Salvar</button>
      </div>
    </form>
  </div>
</main>

</body>
</html>
