<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Eventos</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
</head>

<body>

<main class="page">
  <div class="card">
    <h2 class="page-title" id="formTitle">Novo Evento</h2>

    <div class="segmented" role="group" aria-label="Tipo de cadastro">
      <label class="segmented-item">
        <input type="radio" name="tipoCadastro" value="data" checked>
        <span>Por data</span>
      </label>
      <label class="segmented-item">
        <input type="radio" name="tipoCadastro" value="semanal">
        <span>Semanal</span>
      </label>
    </div>

    <form id="form" class="form">
      <label class="field" id="field-data">
        <span class="label" id="label-data">Data</span>
        <input type="date" id="data" required>
      </label>

      <div id="weekly-fields" hidden>
        <label class="field" id="field-diaSemana">
          <span class="label">Dia da semana</span>
          <select id="diaSemana">
            <option value="1">Segunda</option>
            <option value="2">Terça</option>
            <option value="3">Quarta</option>
            <option value="4">Quinta</option>
            <option value="5">Sexta</option>
            <option value="6">Sábado</option>
            <option value="0">Domingo</option>
          </select>
        </label>
      </div>

      <label class="field">
        <span class="label">Hora</span>
        <input type="time" id="hora" required>
      </label>

      <label class="field">
        <span class="label">Sala</span>
        <input type="text" id="sala" placeholder="Ex.: Sala 01" required>
      </label>

      <label class="field">
        <span class="label">Título</span>
        <input type="text" id="evento" placeholder="Ex.: Reunião" required>
      </label>

      <label class="field">
        <span class="label">Solicitante</span>
        <input type="text" id="solicitante" placeholder="Nome / setor" required>
      </label>

      <div class="actions">
        <button class="btn btn-primary" type="submit" id="saveBtn">Salvar</button>
        <button class="btn" type="button" id="cancelBtn" style="margin-left:10px;">Cancelar</button>
      </div>
    </form>
  </div>

  <div class="card" style="margin-top:18px;">
    <h2 class="page-title">Eventos</h2>
    <div id="eventosList"></div>
  </div>
</main>

<script type="module" src="cadastro.js"></script>

</body>
</html>
