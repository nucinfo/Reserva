<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Eventos</title>
</head>

<body>

<h2>Novo Evento</h2>

<form id="form">

Data
<input type="date" id="data"><br>

Hora
<input type="time" id="hora"><br>

Sala
<input type="text" id="sala"><br>

Evento
<input type="text" id="evento"><br>

Solicitante
<input type="text" id="solicitante"><br>

Repetir
<select id="repetir">
<option value="nao">Não</option>
<option value="sim">Sim</option>
</select>

<button type="submit">Salvar</button>

</form>

</body>
</html>
